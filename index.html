<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Focus Trainer: Enhanced Voice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
            height: 100dvh; 
            width: 100vw;
        }

        #ds-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #111;
            box-sizing: border-box;
        }

        /* === 상단 화면 (게임) flex:2 === */
        #top-screen {
            flex: 2; 
            position: relative;
            background: #000;
            border-bottom: 2px solid #333;
            overflow: hidden;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex; 
            flex-direction: column;
        }

        canvas#game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        #hp-bar-container {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            height: 8px;
            background: #330000;
            border: 1px solid #666;
            border-radius: 4px;
            z-index: 10;
        }
        #hp-bar {
            width: 100%; height: 100%;
            background: linear-gradient(to right, #ff3333, #00ff00);
            transition: width 0.1s linear;
        }

        /* 게임 모드 나가기 버튼 */
        #btn-game-exit {
            position: absolute;
            top: 25px; 
            right: 10px;
            background: rgba(68, 68, 68, 0.8);
            color: white;
            border: 1px solid #666;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            z-index: 50;
        }

        /* === 하단 화면 (퀴즈) flex:1 === */
        #bottom-screen {
            flex: 1;
            position: relative;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px; 
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #444;
            transition: flex 0.3s;
        }

        /* 퀴즈 영역 */
        #quiz-area {
            width: 100%;
            height: 100%;
            background: #222;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px; 
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            pointer-events: auto; 
            z-index: 20;
        }

        /* 연습모드 나가기 버튼 */
        #btn-practice-exit {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            z-index: 50;
            display: none; 
        }

        .q-type { color: #aaa; font-size: 12px; margin-bottom: 5px; font-weight: bold; }
        .q-text { color: white; font-size: 18px; font-weight: bold; line-height: 1.3; word-break: keep-all; flex: 1; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .q-answer { color: #00ff00; font-size: 16px; margin-top: 5px; font-weight: bold; display: none; }
        .q-timer { color: #00ffff; font-size: 20px; margin-top: 5px; font-family: monospace; display: none;}
        
        #mic-status { font-size: 11px; color: #666; margin-top: 5px; width: 100%; }
        .listening { color: #ff5555 !important; animation: pulse 1s infinite; }

        /* 오버레이 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            overflow-y: auto;
        }
        #game-over, #game-clear, #start-screen, #main-menu { z-index: 200; }

        .btn-start {
            padding: 15px 30px;
            font-size: 18px;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            width: 80%;
            max-width: 300px;
        }
        .btn-mode {
            background: #00ffff; 
            color: black; 
            height: 80px; 
            font-size: 20px;
            line-height: 1.2;
        }
        .mode-desc {
            font-size: 12px; 
            font-weight: normal; 
            color: #444;
            display: block;
            margin-top: 5px;
        }
        .btn-retry { background: #ff3333; color: white; }
        .btn-sub { background: #444; color: white; font-size: 14px; }

        /* 설정 UI */
        .settings-box {
            width: 90%;
            max-width: 500px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .section-title { color: #00ffff; font-size: 14px; margin: 15px 0 5px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .radio-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .radio-horizontal { flex-direction: row; justify-content: space-between; }
        
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: #ddd; font-size: 13px; }
        
        .desc-text { font-size: 11px; color: #888; margin-left: 25px; margin-bottom: 5px; display: block;}

        /* 문제 선택기 */
        #problem-selector {
            display: none;
            width: 100%;
        }
        .tab-container { display: flex; border-bottom: 1px solid #444; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #333; color: #888; font-size: 13px;}
        .tab.active { background: #555; color: white; font-weight: bold; }
        
        .problem-list {
            max-height: 150px;
            overflow-y: auto;
            background: #111;
            padding: 5px;
            border: 1px solid #444;
        }
        .problem-item {
            display: flex;
            align-items: flex-start;
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 12px;
            text-align: left;
        }
        .problem-item input { margin-right: 10px; margin-top: 3px; flex-shrink: 0; width: 16px; height: 16px; }

        .mode-specific { display: none; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="ds-container">
    <div id="top-screen">
        <canvas id="game-canvas"></canvas>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <button id="btn-game-exit" onclick="location.reload()">나가기</button>
        
        <div id="game-over" class="overlay" style="display:none;">
            <h1 style="color:red">훈련 실패</h1>
            <p>영역 이탈</p>
            <button class="btn-start btn-retry" onclick="location.reload()">처음으로</button>
        </div>
        
        <div id="game-clear" class="overlay" style="display:none;">
            <h1 style="color:#00ff00">완료</h1>
            <p>모든 문제 해결</p>
            <div style="display:flex; flex-direction:column; width:100%; align-items:center;">
                <button class="btn-start" onclick="app.restartGame()">다시 시작</button>
                <button class="btn-start btn-sub" onclick="location.reload()">홈으로</button>
            </div>
        </div>
    </div>

    <div id="bottom-screen">
        <div id="quiz-area">
            <button id="btn-practice-exit" onclick="location.reload()">나가기</button>
            
            <div class="q-type" id="q-type">READY</div>
            <div class="q-text" id="q-text">모드 선택 중...</div>
            <div class="q-timer" id="q-timer">00.00</div>
            <div class="q-answer" id="q-answer">정답</div>
            <div id="mic-status"></div>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <h1 style="color:#00ff00; margin-bottom: 20px;">Focus Trainer</h1>
        <button class="btn-start btn-mode" onclick="app.selectMode('game')">
            🎮 게임 모드
            <span class="mode-desc">추적 게임 + 구술 훈련</span>
        </button>
        <button class="btn-start btn-mode" style="background:#ffcc00;" onclick="app.selectMode('practice')">
            📚 연습 모드
            <span class="mode-desc">문제 풀이 집중 (게임 X)</span>
        </button>
    </div>

    <div id="start-screen" class="overlay" style="display:none;">
        <h2 style="color:#00ff00; margin: 15px 0;" id="setting-title">설정</h2>
        
        <div class="settings-box">
            
            <div class="section-title">문제 출제 방식</div>
            <div class="radio-group radio-horizontal">
                <label><input type="radio" name="q-mode" value="all" checked onchange="ui.toggleProblemSelector(false)"> 전체 랜덤</label>
                <label><input type="radio" name="q-mode" value="select" onchange="ui.toggleProblemSelector(true)"> 문제 선택</label>
            </div>
            
            <div id="problem-selector">
                <div class="tab-container">
                    <div id="tab-prev" class="tab active" onclick="ui.switchTab('prev')">기존 기출</div>
                    <div id="tab-oral" class="tab" onclick="ui.switchTab('oral')">추가 구술</div>
                </div>
                <div id="list-prev" class="problem-list"></div>
                <div id="list-oral" class="problem-list" style="display:none;"></div>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-sub" style="padding:5px 10px; width:auto;" onclick="ui.selectAll(true)">전체 선택</button>
                    <button class="btn-sub" style="padding:5px 10px; width:auto;" onclick="ui.selectAll(false)">전체 해제</button>
                </div>
            </div>

            <div id="settings-game" class="mode-specific">
                <div class="section-title">난이도 (공 추적 속도)</div>
                <div class="radio-group radio-horizontal">
                    <label><input type="radio" name="diff" value="easy"> 쉬움 (1.0)</label>
                    <label><input type="radio" name="diff" value="normal" checked> 보통 (2.0)</label>
                    <label><input type="radio" name="diff" value="hard"> 어려움 (3.0)</label>
                </div>
                <p class="desc-text" style="line-height:1.4;">
                * 쉬움: 직선 이동 (방향 전환 X)<br>
                * 보통: 3초 이상 이동 후 방향 전환
                </p>
            </div>

            <div id="settings-practice" class="mode-specific">
                <div class="section-title">연습 방식 설정</div>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="p-mode" value="continuous" checked onchange="ui.toggleTimerSetting(false)"> 
                        연속 모드
                    </label>
                    <span class="desc-text">답변 완료 시 즉시 다음 문제</span>
                    
                    <label>
                        <input type="radio" name="p-mode" value="timer" onchange="ui.toggleTimerSetting(true)"> 
                        시간 설정 모드
                    </label>
                    <span class="desc-text">정해진 시간마다 문제 자동 변경</span>
                </div>

                <div id="timer-input-area" style="display:none; margin-top:10px; border-top:1px dashed #444; padding-top:10px;">
                    <label style="font-size:16px;">
                        ⏱️ 간격 설정: 
                        <input type="number" id="p-interval" value="1" style="width:60px; background:#333; color:white; border:1px solid #555; padding:5px; margin:0 10px;"> 
                        분
                    </label>
                </div>
            </div>

            <div class="section-title">음성 / TTS 설정</div>
            <div class="checkbox-row">
                <label><input type="checkbox" id="use-voice" checked> 내 목소리 인식 (Chrome)</label>
            </div>
            <div class="checkbox-row">
                <label><input type="checkbox" id="use-tts" checked> 문제 읽어주기 (TTS)</label>
            </div>
        </div>

        <button class="btn-start" onclick="app.start()">시작하기</button>
        <button class="btn-start btn-sub" onclick="location.reload()">뒤로 가기</button>
    </div>
</div>

/* ------------------------------------------------------------------
   2. 추적 게임 (Tracker)
------------------------------------------------------------------ */
class TrackerGame {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        
        this.player = { x: 0, y: 0, radius: 10 };
        this.zone = { x: 0, y: 0, width: 100, height: 100, radius: 0, vx: 0, vy: 0 };
        
        this.difficulty = 'normal'; 
        this.zoneSpeed = 0; 
        this.health = 100;
        this.active = false;
        
        // 시간 기반 타이머 (ms)
        this.nextChangeTime = 0;

        this.isDragging = false;
        this.dragOffset = { x: 0, y: 0 };
        
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.canvas.addEventListener('mousedown', e => this.handleStart(e));
        window.addEventListener('mousemove', e => this.handleMove(e));
        window.addEventListener('mouseup', e => this.handleEnd(e));
        
        this.canvas.addEventListener('touchstart', e => this.handleStart(e), {passive: false});
        window.addEventListener('touchmove', e => this.handleMove(e), {passive: false});
        window.addEventListener('touchend', e => this.handleEnd(e));
    }

    getPos(e) {
        let cx, cy;
        if(e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        const rect = this.canvas.getBoundingClientRect();
        return { x: cx - rect.left, y: cy - rect.top };
    }

    handleStart(e) {
        if (!this.active) return;
        e.preventDefault();
        const pos = this.getPos(e);
        const dist = Math.sqrt((pos.x - this.player.x)**2 + (pos.y - this.player.y)**2);
        
        if (dist < this.player.radius * 3.0) { 
            this.isDragging = true;
            this.dragOffset.x = pos.x - this.player.x;
            this.dragOffset.y = pos.y - this.player.y;
        }
    }

    handleMove(e) {
        if (!this.active || !this.isDragging) return;
        e.preventDefault(); 
        const pos = this.getPos(e);
        
        this.player.x = pos.x - this.dragOffset.x;
        this.player.y = pos.y - this.dragOffset.y;

        this.player.x = Math.max(this.player.radius, Math.min(this.canvas.width - this.player.radius, this.player.x));
        this.player.y = Math.max(this.player.radius, Math.min(this.canvas.height - this.player.radius, this.player.y));
    }

    handleEnd(e) {
        this.isDragging = false;
    }

    resize() {
        this.canvas.width = this.canvas.parentElement.clientWidth;
        this.canvas.height = this.canvas.parentElement.clientHeight;
        if (!this.active && this.canvas.width > 0) {
            this.player.x = this.canvas.width / 2;
            this.player.y = this.canvas.height / 2;
            this.zone.x = this.canvas.width / 2;
            this.zone.y = this.canvas.height / 2;
        }
    }

    start(diff) {
        this.difficulty = diff;
        this.active = true;
        this.health = 100;
        this.isDragging = false;
        
        this.resize(); 

        // 속도 및 크기 설정
        if (diff === 'easy') {
            this.zoneSpeed = 1.0; 
            this.zone.width = 120; this.zone.height = 120;
            this.zone.radius = 0;
            this.nextChangeTime = Infinity; // 방향 전환 없음 (직진만)
        } else if (diff === 'normal') {
            this.zoneSpeed = 2.0; 
            this.zone.width = 100; this.zone.height = 100;
            this.zone.radius = 15; 
            // 3초 이상 (ms 기준)
            this.nextChangeTime = Date.now() + 3000 + Math.random() * 2000;
        } else {
            this.zoneSpeed = 3.0; 
            this.zone.width = 80; this.zone.height = 80;
            this.zone.radius = 15;
            this.nextChangeTime = Date.now() + 1000 + Math.random() * 1000;
        }

        // 초기 이동 방향 설정
        this.setRandomVelocity();
    }

    setRandomVelocity() {
        const angle = Math.random() * Math.PI * 2;
        this.zone.vx = Math.cos(angle) * this.zoneSpeed;
        this.zone.vy = Math.sin(angle) * this.zoneSpeed;
        
        // 타이머 재설정 (실제 시간 기반)
        if (this.difficulty === 'normal') {
            this.nextChangeTime = Date.now() + 3000 + Math.random() * 2000;
        } else if (this.difficulty === 'hard') {
            this.nextChangeTime = Date.now() + 1000 + Math.random() * 1000;
        }
    }

    update() {
        if (!this.active) return;
        this.updateZoneAI();
        this.checkCollision();
    }

    updateZoneAI() {
        // 1. 이동
        this.zone.x += this.zone.vx;
        this.zone.y += this.zone.vy;

        const halfW = this.zone.width / 2;
        const halfH = this.zone.height / 2;

        // 2. 벽 튕기기
        let hitWall = false;
        if (this.zone.x - halfW < 0) {
            this.zone.x = halfW;
            this.zone.vx *= -1;
            hitWall = true;
        } else if (this.zone.x + halfW > this.canvas.width) {
            this.zone.x = this.canvas.width - halfW;
            this.zone.vx *= -1;
            hitWall = true;
        }

        if (this.zone.y - halfH < 0) {
            this.zone.y = halfH;
            this.zone.vy *= -1;
            hitWall = true;
        } else if (this.zone.y + halfH > this.canvas.height) {
            this.zone.y = this.canvas.height - halfH;
            this.zone.vy *= -1;
            hitWall = true;
        }

        // 3. 시간 경과에 따른 방향 전환 (쉬움 제외)
        if (this.difficulty !== 'easy') {
            if (Date.now() > this.nextChangeTime) {
                this.setRandomVelocity();
            }
        }
        
        // Hard 모드 Morphing
        if (this.difficulty === 'hard') {
            const time = Date.now() / 500;
            this.zone.radius = 10 + ((Math.sin(time) + 1) * 15);
        }
    }

    checkCollision() {
        const halfW = this.zone.width / 2;
        const halfH = this.zone.height / 2;
        const dx = Math.abs(this.player.x - this.zone.x);
        const dy = Math.abs(this.player.y - this.zone.y);
        let inside = false;

        if (dx < halfW && dy < halfH) inside = true;

        const hpBar = document.getElementById('hp-bar');
        if (inside) {
            this.ctx.strokeStyle = "#00ff00"; 
            this.health = Math.min(100, this.health + 0.15); 
        } else {
            this.ctx.strokeStyle = "#ff0000"; 
            this.health -= 0.15; 
            if (this.health <= 0) {
                this.health = 0;
                app.gameOver();
            }
        }
        hpBar.style.width = this.health + "%";
    }

    render() {
        this.ctx.fillStyle = "#000";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.ctx.strokeStyle = "#222";
        this.ctx.lineWidth = 1;
        const gridSize = 50;
        this.ctx.beginPath();
        for(let x=0; x<this.canvas.width; x+=gridSize) {
            this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.canvas.height);
        }
        for(let y=0; y<this.canvas.height; y+=gridSize) {
            this.ctx.moveTo(0, y); this.ctx.lineTo(this.canvas.width, y);
        }
        this.ctx.stroke();

        this.ctx.lineWidth = 4;
        this.ctx.strokeStyle = this.ctx.strokeStyle === "#00ff00" ? "#00ff00" : "#ff0000";
        this.drawRoundRect(this.zone.x - this.zone.width/2, this.zone.y - this.zone.height/2, 
                           this.zone.width, this.zone.height, this.zone.radius);
        this.ctx.stroke();
        this.ctx.fillStyle = this.ctx.strokeStyle === "#00ff00" ? "rgba(0, 255, 0, 0.1)" : "rgba(255, 0, 0, 0.1)";
        this.ctx.fill();

        this.ctx.fillStyle = "#00ffff";
        this.ctx.shadowBlur = 15;
        this.ctx.shadowColor = "#00ffff";
        this.ctx.beginPath();
        this.ctx.arc(this.player.x, this.player.y, this.player.radius, 0, Math.PI*2);
        this.ctx.fill();
        this.ctx.shadowBlur = 0;
    }

    drawRoundRect(x, y, w, h, r) {
        this.ctx.beginPath();
        this.ctx.moveTo(x + r, y);
        this.ctx.arcTo(x + w, y, x + w, y + h, r);
        this.ctx.arcTo(x + w, y + h, x, y + h, r);
        this.ctx.arcTo(x, y + h, x, y, r);
        this.ctx.arcTo(x, y, x + w, y, r);
        this.ctx.closePath();
    }
}

/* ------------------------------------------------------------------
   3. 퀴즈 매니저
------------------------------------------------------------------ */
class QuizManager {
    constructor() {
        this.currentSet = [];
        this.remaining = [];
        this.active = false;
        this.state = 'idle'; 
        this.timerStart = 0;
        this.timerRef = null;
        this.nextTimer = null;
        this.intervalTimer = null;
        
        this.mode = 'game'; 
        this.practiceType = 'continuous'; 
        this.practiceInterval = 60; 

        this.useVoice = false;
        this.useTTS = false;
        this.recognition = null;
        this.initVoice();
    }

    initVoice() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
            this.recognition = new SR();
            this.recognition.lang = 'ko-KR';
            this.recognition.continuous = true;
            this.recognition.interimResults = false;
            this.recognition.onresult = (e) => {
                const txt = e.results[e.results.length-1][0].transcript;
                this.processVoice(txt);
            };
            this.recognition.onend = () => {
                if (this.active && this.useVoice) try{this.recognition.start()}catch(e){}
            };
        }
    }
    
    // Levenshtein Distance 계산 함수
    getLevenshteinDistance(a, b) {
        if (a.length === 0) return b.length;
        if (b.length === 0) return a.length;
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1)
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    processVoice(txt) {
        if (!this.active) return;
        
        // 정규화 (공백 및 특수문자 제거)
        const cleanText = txt.replace(/[.,?!]/g, "").replace(/\s/g, "");

        if (this.mode === 'game' || (this.mode === 'practice' && this.practiceType === 'continuous')) {
            if (this.state === 'answering') {
                // 검사할 키워드 목록
                const targets = ["이상", "이상입니다", "끝", "끝입니다", "종료"];
                let matched = false;

                for (let target of targets) {
                    // 1. 정확히 일치하는 경우
                    if (cleanText.includes(target)) {
                        matched = true; 
                        break;
                    }

                    // 2. Levenshtein Distance 체크
                    // "끝" 같은 1글자는 정확도 위해 제외 (2글자 이상만 퍼지 매칭)
                    if (target.length >= 2) {
                        const dist = this.getLevenshteinDistance(cleanText, target);
                        // 5글자 이상("이상입니다")은 2개까지, 그 외는 1개까지 오차 허용
                        const threshold = (target.length >= 5) ? 2 : 1;
                        
                        // 입력된 텍스트가 키워드보다 훨씬 길 수 있으므로 (문장 끝에 포함된 경우)
                        // 뒷부분만 잘라서 비교하거나, 전체 거리 체크는 짧은 발화일 때 유효
                        if (cleanText.length <= target.length + 2 && dist <= threshold) {
                            matched = true;
                            break;
                        }
                        
                        // 문장 끝부분 확인 ("~~~ 이산입니다" 같은 경우)
                        const suffix = cleanText.slice(-target.length);
                        if (this.getLevenshteinDistance(suffix, target) <= threshold) {
                             matched = true;
                             break;
                        }
                    }
                }

                if (matched) {
                    this.finishAnswering();
                }
            }
        }
    }

    setQuestions(list) {
        this.currentSet = [...list];
    }
    
    shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    start(config) {
        this.active = true;
        this.mode = config.mode;
        this.practiceType = config.practiceType;
        this.practiceInterval = config.practiceInterval;
        this.useVoice = config.useVoice;
        this.useTTS = config.useTTS;

        this.remaining = this.shuffleArray([...this.currentSet]);
        
        if (this.useVoice && this.recognition) try{this.recognition.start()}catch(e){}
        
        document.getElementById('btn-practice-exit').style.display = (this.mode === 'practice') ? 'block' : 'none';

        if (this.mode === 'practice' && this.practiceType === 'timer') {
             this.showQuestion();
             this.intervalTimer = setInterval(() => {
                 this.finishAnswering(true); 
             }, this.practiceInterval * 1000);
        } else {
            this.scheduleNext();
        }
    }

    stop() {
        this.active = false;
        if (this.recognition) try{this.recognition.stop()}catch(e){}
        clearTimeout(this.nextTimer);
        clearInterval(this.intervalTimer);
        cancelAnimationFrame(this.timerRef);
        window.speechSynthesis.cancel(); 
    }

    scheduleNext() {
        if (this.remaining.length === 0) {
            if (this.mode === 'practice') {
                 this.remaining = this.shuffleArray([...this.currentSet]);
            } else {
                 app.gameClear();
                 return;
            }
        }

        const delay = this.mode === 'game' ? (3000 + Math.random() * 3000) : 500;
        
        this.state = 'idle';
        document.getElementById('q-type').innerText = "STANDBY";
        document.getElementById('q-text').innerText = `대기 중... (남은: ${this.remaining.length})`;
        document.getElementById('q-answer').style.display = 'none';
        document.getElementById('q-timer').style.display = 'none';
        
        const micEl = document.getElementById('mic-status');
        micEl.innerText = "다음 문제 준비 중...";
        micEl.className = "";

        this.nextTimer = setTimeout(() => this.showQuestion(), delay);
    }

    showQuestion() {
        if (!this.active) return;
        
        if (this.remaining.length === 0) {
            if (this.mode === 'practice') {
                 this.remaining = this.shuffleArray([...this.currentSet]);
            } else {
                 app.gameClear();
                 return;
            }
        }

        const rawQ = this.remaining.pop();
        const displayText = rawQ.replace(/^[0-9]+(-[0-9]+)?\.\s*/, "");

        this.state = 'question';
        document.getElementById('q-type').innerText = "QUESTION";
        document.getElementById('q-text').innerText = displayText;
        
        const micEl = document.getElementById('mic-status');

        if (this.mode === 'practice' && this.practiceType === 'timer') {
             if (this.useTTS) this.speak(displayText); 
             micEl.innerText = `⏳ ${this.practiceInterval / 60}분 마다 변경 중`;
             this.state = 'viewing'; 
        } else {
            if (this.useTTS) {
                micEl.innerText = "🔊 문제 읽는 중...";
                this.speak(displayText, () => {
                    this.startAnswering();
                });
            } else {
                this.startAnswering();
            }
        }
    }
    
    speak(text, callback) {
        if (!window.speechSynthesis) {
            if(callback) callback();
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.0; 
        
        if (callback) {
            utterance.onend = () => {
                if(this.active) callback();
            };
        }
        
        window.speechSynthesis.speak(utterance);
    }

    startAnswering() {
        if (this.mode === 'practice' && this.practiceType === 'timer') return;

        this.state = 'answering';
        this.timerStart = performance.now();
        document.getElementById('q-type').innerText = "RECORDING...";
        document.getElementById('q-timer').style.display = 'block';
        
        const micEl = document.getElementById('mic-status');
        if (this.useVoice) {
            micEl.innerText = "🗣️ 답변 후 '이상입니다' 발언";
            micEl.className = "listening";
        } else {
            micEl.innerText = "답변 후 터치하여 완료";
            micEl.className = "";
        }
        
        this.updateTimer();
    }

    updateTimer() {
        if (this.state !== 'answering') return;
        const now = performance.now();
        const t = (now - this.timerStart) / 1000;
        document.getElementById('q-timer').innerText = t.toFixed(2);
        this.timerRef = requestAnimationFrame(() => this.updateTimer());
    }

    finishAnswering(auto = false) {
        this.state = 'result';
        cancelAnimationFrame(this.timerRef);
        document.getElementById('q-type').innerText = "DONE";
        document.getElementById('mic-status').className = "";

        if (auto) {
            this.showQuestion();
        } else {
            document.getElementById('mic-status').innerText = "다음 문제로 넘어갑니다.";
            const waitTime = (this.mode === 'practice') ? 500 : 3000;
            setTimeout(() => {
                if(this.active) this.scheduleNext();
            }, waitTime);
        }
    }

    handleTouch() {
        if (this.mode === 'practice' && this.practiceType === 'timer') return;
        if (this.state === 'answering') this.finishAnswering();
    }
}

const ui = {
    toggleProblemSelector: function(show) {
        document.getElementById('problem-selector').style.display = show ? 'block' : 'none';
        if (show) this.checkAndLoadHistory();
    },
    toggleTimerSetting: function(show) {
        document.getElementById('timer-input-area').style.display = show ? 'block' : 'none';
    },
    switchTab: function(tab) {
        const tabPrev = document.getElementById('tab-prev');
        const tabOral = document.getElementById('tab-oral');
        const listPrev = document.getElementById('list-prev');
        const listOral = document.getElementById('list-oral');

        if (tab === 'prev') {
            tabPrev.classList.add('active');
            tabOral.classList.remove('active');
            listPrev.style.display = 'block';
            listOral.style.display = 'none';
        } else {
            tabPrev.classList.remove('active');
            tabOral.classList.add('active');
            listPrev.style.display = 'none';
            listOral.style.display = 'block';
        }
    },
    renderList: function(id, list) {
        const container = document.getElementById(id);
        container.innerHTML = list.map(q => `
            <label class="problem-item">
                <input type="checkbox" value="${q}">
                ${q}
            </label>
        `).join('');
    },
    selectAll: function(select) {
        const activeListId = document.getElementById('list-prev').style.display !== 'none' ? 'list-prev' : 'list-oral';
        const inputs = document.getElementById(activeListId).querySelectorAll('input');
        inputs.forEach(input => input.checked = select);
    },
    getSelectedQuestions: function() {
        const mode = document.querySelector('input[name="q-mode"]:checked').value;
        if (mode === 'all') {
            return [...QUESTIONS_PREV, ...QUESTIONS_ORAL];
        } else {
            const inputs = document.querySelectorAll('.problem-item input:checked');
            return Array.from(inputs).map(input => input.value);
        }
    },
    checkAndLoadHistory: function() {
        const saved = localStorage.getItem('focusTrainer_lastSelection');
        if (!saved) return;
        
        if (this.historyLoaded) return;

        if (confirm("이전에 선택했던 문제 목록을 불러오시겠습니까?")) {
            const savedList = JSON.parse(saved);
            const inputs = document.querySelectorAll('.problem-item input');
            inputs.forEach(input => {
                if (savedList.includes(input.value)) input.checked = true;
            });
            this.historyLoaded = true;
        } else {
            this.historyLoaded = true; 
        }
    },
    saveHistory: function(list) {
        localStorage.setItem('focusTrainer_lastSelection', JSON.stringify(list));
    }
};

const tracker = new TrackerGame('game-canvas');
const quiz = new QuizManager();

const app = {
    mode: 'game', 
    lastFrameTime: 0, 

    init: function() {
        ui.renderList('list-prev', QUESTIONS_PREV);
        ui.renderList('list-oral', QUESTIONS_ORAL);
    },
    selectMode: function(mode) {
        this.mode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';

        ui.historyLoaded = false;

        if (mode === 'game') {
            document.getElementById('setting-title').innerText = "게임 모드 설정";
            document.getElementById('settings-game').style.display = 'block';
            document.getElementById('settings-practice').style.display = 'none';
        } else {
            document.getElementById('setting-title').innerText = "연습 모드 설정";
            document.getElementById('settings-game').style.display = 'none';
            document.getElementById('settings-practice').style.display = 'block';
        }
    },
    start: function() {
        const selectedQ = ui.getSelectedQuestions();
        if (selectedQ.length === 0) {
            alert("최소 1개 이상의 문제를 선택해주세요.");
            return;
        }
        
        if (document.querySelector('input[name="q-mode"]:checked').value === 'select') {
            ui.saveHistory(selectedQ);
        }

        const useVoice = document.getElementById('use-voice').checked;
        const useTTS = document.getElementById('use-tts').checked;
        
        let practiceType = 'continuous';
        let practiceInterval = 60;

        if (this.mode === 'practice') {
            practiceType = document.querySelector('input[name="p-mode"]:checked').value;
            practiceInterval = (parseInt(document.getElementById('p-interval').value) || 1) * 60;
        }

        document.getElementById('start-screen').style.display = 'none';
        
        const topScreen = document.getElementById('top-screen');
        const bottomScreen = document.getElementById('bottom-screen');

        if (this.mode === 'game') {
            topScreen.style.display = 'flex';
            topScreen.style.flex = '2';
            bottomScreen.style.flex = '1';
            const diff = document.querySelector('input[name="diff"]:checked').value;
            tracker.start(diff);
            this.loop(0);
        } else {
            topScreen.style.display = 'none';
            bottomScreen.style.height = '100%';
        }

        quiz.setQuestions(selectedQ);
        quiz.start({
            mode: this.mode,
            practiceType: practiceType,
            practiceInterval: practiceInterval,
            useVoice: useVoice,
            useTTS: useTTS
        });
    },
    loop: function(timestamp) {
        if (!tracker.active) return;
        if (!this.lastFrameTime) this.lastFrameTime = timestamp;

        const elapsed = timestamp - this.lastFrameTime;

        if (elapsed > 1000 / 60) {
            tracker.update();
            tracker.render();
            this.lastFrameTime = timestamp;
        }

        requestAnimationFrame((t) => this.loop(t));
    },
    gameOver: function() {
        tracker.active = false;
        quiz.stop();
        document.getElementById('game-over').style.display = 'flex';
    },
    gameClear: function() {
        tracker.active = false;
        quiz.stop();
        document.getElementById('game-clear').style.display = 'flex';
    },
    restartGame: function() {
        document.getElementById('game-clear').style.display = 'none';
        
        if (this.mode === 'game') {
            tracker.start(tracker.difficulty);
            if(!tracker.active) {
                 tracker.active = true; 
                 requestAnimationFrame((t) => this.loop(t));
            }
        }
        
        quiz.start({
            mode: this.mode,
            practiceType: quiz.practiceType,
            practiceInterval: quiz.practiceInterval,
            useVoice: quiz.useVoice,
            useTTS: quiz.useTTS
        });
    }
};

app.init();

const quizArea = document.getElementById('quiz-area');
quizArea.addEventListener('mousedown', (e) => {
    if(e.target.id === 'btn-practice-exit') return;
    quiz.handleTouch();
});
